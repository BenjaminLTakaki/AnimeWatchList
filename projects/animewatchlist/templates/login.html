{% extends "base.html" %}

{% block title %}Sign In - AnimeList{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo__text">Anime<span>LIST</span></div>
    <div class="auth-logo__sub">Sign in to your account</div>
  </div>

  <a href="{{ get_url_for('mal_authorize') }}" class="auth-mal">
    <span class="auth-mal__badge">MAL</span>
    Continue with MyAnimeList
  </a>

  <div class="auth-divider">or sign in with password</div>

  <form method="POST" action="{{ get_url_for('login') }}" class="auth-form">
    <div class="field">
      <label for="username">Username or Email</label>
      <input id="username" name="username" type="text"
             value="{{ request.form.get('username', '') }}"
             placeholder="Enter your username"
             required autocomplete="username">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password"
             placeholder="Enter your password"
             required autocomplete="current-password">
    </div>

    <button type="submit" class="btn btn--solid" style="width:100%;justify-content:center;padding:12px;margin-top:8px;">
      Sign In
    </button>
  </form>

  <div class="auth-toggle">
    <a href="{{ get_url_for('register') }}">Need an account? Register</a>
  </div>
</div>
{% endblock %}

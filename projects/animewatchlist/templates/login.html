{% extends "base.html" %}

{% block title %}Login - Anime Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>Welcome Back!</h2>
        <p>Sign in to continue tracking your anime</p>
    </div>

    <form method="POST" action="{{ get_url_for('login') }}" class="auth-form">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input
                id="username"
                name="username"
                type="text"
                class="form-control"
                placeholder="Enter your username"
                value="{{ request.form.get('username', '') }}"
                required
                autocomplete="username"
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
            >
        </div>

        <div class="form-action">
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </div>

        <div class="auth-links">
            <p>Need an account? <a href="{{ get_url_for('register') }}">Sign Up Now</a></p>
        </div>
    </form>
</div>

<style>
.auth-container {
    background: #0f0f0f;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    border: 1px solid #242424;
    padding: 2.5rem;
    max-width: 460px;
    margin: 2rem auto;
    width: 100%;
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header h2 {
    color: #e8d5a3;
    margin-bottom: 0.5rem;
    font-size: 1.7rem;
    font-weight: 700;
}

.auth-header p {
    color: #777;
    margin: 0;
    font-size: 0.95rem;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.3rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-label {
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #999;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.form-control {
    padding: 0.9rem 1rem;
    border: 1px solid #2b2b2b;
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.2s ease;
    min-height: 48px;
    background: #101010;
    color: #ddd;
}

.form-control:focus {
    outline: none;
    border-color: #e8d5a3;
    box-shadow: 0 0 0 2px rgba(232, 213, 163, 0.2);
}

.form-control::placeholder {
    color: #666;
}

.form-action {
    margin-top: 0.5rem;
}

.btn-full {
    width: 100%;
    padding: 0.9rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    min-height: 48px;
}

.invalid-feedback {
    color: #f87171;
    font-size: 0.82rem;
    margin-top: 0.4rem;
    padding: 0.5rem 0.8rem;
    background: rgba(248, 113, 113, 0.1);
    border-radius: 6px;
    border-left: 3px solid #f87171;
}

.auth-links {
    margin-top: 1rem;
    text-align: center;
    font-size: 0.88rem;
    padding-top: 1rem;
    border-top: 1px solid #2b2b2b;
    color: #888;
}

.auth-links a {
    color: #e8d5a3;
    text-decoration: none;
    font-weight: 600;
}

.auth-links a:hover {
    color: #fff;
}

@media (max-width: 767px) {
    .auth-container {
        margin: 1rem;
        padding: 1.5rem;
        max-width: none;
    }
    .form-control {
        font-size: 16px;
    }
}
</style>
{% endblock %}

{% extends "base.html" %}

{% block title %}Create Account - AnimeList{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo__text">Anime<span>LIST</span></div>
    <div class="auth-logo__sub">Create your account</div>
  </div>

  <a href="{{ get_url_for('mal_authorize') }}" class="auth-mal">
    <span class="auth-mal__badge">MAL</span>
    Continue with MyAnimeList
  </a>

  <div class="auth-divider">or create with password</div>

  <form method="POST" action="{{ get_url_for('register') }}" class="auth-form" novalidate>
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text"
             value="{{ request.form.get('username', '') }}"
             placeholder="Choose a username"
             required autocomplete="username">
    </div>

    <div class="field">
      <label for="email">Email (optional)</label>
      <input id="email" name="email" type="email"
             value="{{ request.form.get('email', '') }}"
             placeholder="Enter your email"
             autocomplete="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password"
             placeholder="Create a password (min 6 chars)"
             required minlength="6" autocomplete="new-password">
    </div>

    <button type="submit" class="btn btn--solid" style="width:100%;justify-content:center;padding:12px;margin-top:8px;">
      Create Account
    </button>
  </form>

  <div class="auth-toggle">
    <a href="{{ get_url_for('login') }}">Already have an account? Sign In</a>
  </div>
</div>
{% endblock %}

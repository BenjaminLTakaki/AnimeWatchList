{% extends "base.html" %}

{% block title %}Register - Anime Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>Create Account</h2>
        <p>Start tracking your anime list</p>
    </div>

    <form method="POST" action="{{ get_url_for('register') }}" class="auth-form" novalidate>
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input
                id="username"
                name="username"
                type="text"
                class="form-control"
                placeholder="Choose a username"
                value="{{ request.form.get('username', '') }}"
                required
                autocomplete="username"
            >
            <div class="form-hint">4-25 characters recommended</div>
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email (optional)</label>
            <input
                id="email"
                name="email"
                type="email"
                class="form-control"
                placeholder="Enter your email"
                value="{{ request.form.get('email', '') }}"
                autocomplete="email"
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                placeholder="Create a password"
                required
                minlength="6"
                autocomplete="new-password"
            >
            <div class="form-hint">Minimum 6 characters</div>
        </div>

        <div class="form-action">
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </div>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ get_url_for('login') }}">Sign In</a></p>
        </div>
    </form>
</div>

<style>
.auth-container {
    background: #0f0f0f;
    border: 1px solid #242424;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    padding: 2rem;
    max-width: 460px;
    margin: 2rem auto;
    width: 100%;
}

.auth-header {
    text-align: center;
    margin-bottom: 1.5rem;
}

.auth-header h2 {
    color: #e8d5a3;
    margin-bottom: 0.4rem;
}

.auth-header p {
    color: #8b8b8b;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-label {
    color: #a0a0a0;
    font-size: 0.82rem;
    margin-bottom: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.form-control {
    padding: 0.85rem 0.95rem;
    border: 1px solid #2b2b2b;
    border-radius: 8px;
    background: #121212;
    color: #dddddd;
}

.form-control:focus {
    outline: none;
    border-color: #e8d5a3;
    box-shadow: 0 0 0 2px rgba(232, 213, 163, 0.18);
}

.form-control::placeholder {
    color: #666;
}

.form-hint {
    color: #777;
    font-size: 0.78rem;
    margin-top: 0.3rem;
}

.btn-full {
    width: 100%;
    min-height: 46px;
    border-radius: 8px;
    font-weight: 600;
}

.auth-links {
    margin-top: 0.8rem;
    text-align: center;
    color: #888;
    font-size: 0.88rem;
    border-top: 1px solid #2b2b2b;
    padding-top: 0.9rem;
}

.auth-links a {
    color: #e8d5a3;
    text-decoration: none;
}

.auth-links a:hover {
    color: #fff;
}

@media (max-width: 767px) {
    .auth-container {
        margin: 1rem;
        padding: 1.25rem;
        max-width: none;
    }

    .form-control {
        font-size: 16px;
    }
}
</style>
{% endblock %}
